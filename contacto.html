    <h1>Contacto</h1>

    <!-- INFORMACIÓN DE CONTACTO -->
    <section>
        <p>Podés escribirnos a nuestro email o redes sociales.</p>

        <!-- ej:
        <p>Email: mitienda@gmail.com</p>
        <p>Instagram: @mitienda</p>
        -->
    </section>


    <!-- FORMULARIO DE CONTACTO FUTURO -->
    <!-- Esta sección permite que el usuario envíe mensajes -->
    <section>

    
        <form id="formulario">
    <label>Nombre:</label>
    <input type="text" id="nombre">

    <label>Email:</label>
    <input type="email" id="email">

    <label>Mensaje:</label>
    <textarea id="mensaje"></textarea>

    <button type="submit">Enviar</button>
</form>


<script>
document.getElementById("formulario").addEventListener("submit", function(e) {
    e.preventDefault();

    let nombre = document.getElementById("nombre").value;
    let email = document.getElementById("email").value;
    let mensaje = document.getElementById("mensaje").value;

    let datos = {
        nombre: nombre,
        email: email,
        mensaje: mensaje
    };

    
    let comentarios = JSON.parse(localStorage.getItem("comentarios")) || [];


    comentarios.push(datos);

   
    localStorage.setItem("comentarios", JSON.stringify(comentarios));

    alert("Comentario guardado correctamente");

    document.getElementById("formulario").reset();
});
</script>


        <li><a href="comentarios.html">Ver Comentarios</a></li>
