<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contacto - Mi Tienda</title>
<link rel="stylesheet" href="estilos.css">
</head>

<body>

<header>
  <main>
    <h1>Mi Tienda</h1>
    <div>
      <img src="logotipo-de-allka.jpg" alt="Logo Allka">
      <h1>Allka</h1>
    </div>
  </main>

  <nav>
    <ul id="lista-header">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="productos.html">Productos</a></li>
      <li><a href="categorias.html">Categorías</a></li>
      <li><a href="contacto.html">Contacto</a></li>
    </ul>
  </nav>
</header>

<main>
  <h1>Contacto</h1>

  <section>
    <p>Podés escribirnos a nuestro correo electrónico o redes sociales.</p>
    <p>Correo electrónico: allkaexclusiveclub@gmail.com</p>
    <p>Instagram: @allkaexclusiveclub</p>
    <p>Tiktok: @allkaexclusiveclub</p>
  </section>

  <section>
    <form id="formulario">
      <label>Nombre:</label>
      <input type="text" id="nombre" required>

      <label>Correo electrónico:</label>
      <input type="email" id="email" required>

      <label>Mensaje:</label>
      <textarea id="mensaje" required></textarea>

      <button type="submit">Enviar</button>
    </form>
  </section>

<a href="comentarios.html" id="ver-comentarios">Ver Comentarios</a>

</main>

<footer>
  <p>© 2026 Mi Tienda</p>
</footer>

<script>
document.getElementById("formulario").addEventListener("submit", function(e) {
  e.preventDefault();

  let nombre = document.getElementById("nombre").value;
  let correo = document.getElementById("email").value;
  let mensaje = document.getElementById("mensaje").value;

  let datos = {
    nombre: nombre,
    correo: correo,
    mensaje: mensaje
  };

  let comentarios = JSON.parse(localStorage.getItem("comentarios")) || [];
  comentarios.push(datos);

  localStorage.setItem("comentarios", JSON.stringify(comentarios));

  alert("Comentario guardado correctamente");
  document.getElementById("formulario").reset();
});
</script>

</body>
</html>
