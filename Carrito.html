<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Carrito</title>
  <link rel="stylesheet" href="estilos.css">
</head>

<body>

<main>

  <h1 class="titulo-seccion">Tu carrito 🛒</h1>

  <p class="total">Total: $<span id="total">0</span></p>

  <div id="contenedor-carrito"></div>

  <div class="acciones-carrito">
    <button onclick="vaciar()">Vaciar carrito</button>
    <a href="index.html" class="btn-volver">Volver a la tienda</a>
  </div>

</main>

<!-- NOTIFICACIÓN -->
<div id="notificacion"></div>

<script>
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
let contenedor = document.getElementById("contenedor-carrito");
let total = 0;

function mostrarCarrito() {
  contenedor.innerHTML = "";
  total = 0;

  if (carrito.length === 0) {
    contenedor.innerHTML = "<p style='text-align:center;'>El carrito está vacío</p>";
    document.getElementById("total").textContent = 0;
    return;
  }

  carrito.forEach((producto, index) => {
    let item = document.createElement("div");

    item.innerHTML = `
      <img src="${producto.imagen}" width="100">
      <div>
        <p>${producto.nombre}</p>
        <p>$${producto.precio}</p>
      </div>
      <button onclick="eliminar(${index})">Eliminar</button>
    `;

    contenedor.appendChild(item);

    total += producto.precio;
  });

  document.getElementById("total").textContent = total;
}

function eliminar(index) {
  carrito.splice(index, 1);
  localStorage.setItem("carrito", JSON.stringify(carrito));

  mostrarCarrito();
  mostrarNotificacion("Producto eliminado");
}

function vaciar() {
  localStorage.removeItem("carrito");
  carrito = [];

  mostrarCarrito();
  mostrarNotificacion("Carrito vaciado");
}

function mostrarNotificacion(mensaje) {
  let notif = document.getElementById("notificacion");

  notif.textContent = "✔ " + mensaje;
  notif.classList.add("mostrar");

  setTimeout(() => {
    notif.classList.remove("mostrar");
  }, 2500);
}

mostrarCarrito();
</script>

</body>
</html>
